<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population +1 TikTok Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .logo-container {
            width: 1080px;
            height: 1080px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #39a62b;
            padding: 40px;
            position: relative;
        }

        .inner-border {
            position: absolute;
            inset: 30px;
            border: 6px solid #ffffff;
            border-radius: 8px;
            pointer-events: none;
        }

        .population-text {
            font-weight: 900;
            font-size: 120px;
            letter-spacing: 10px;
            color: #ffffff;
            z-index: 1;
        }

        .plus-one-wrap {
            display: flex;
            align-items: flex-start;
            gap: 0;
            z-index: 1;
            line-height: 1;
        }

        .plus {
            font-weight: 900;
            font-size: 320px;
            color: #ffffff;
            line-height: 0.85;
            margin-right: -10px;
        }

        .one {
            font-weight: 900;
            font-size: 420px;
            color: #ffffff;
            line-height: 0.75;
        }

        .tm {
            font-weight: 400;
            font-size: 40px;
            color: #ffffff;
            align-self: center;
            margin-left: 8px;
            margin-top: 60px;
        }

        .instructions {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div>
        <div class="logo-container" id="logo">
            <div class="inner-border"></div>
            <span class="population-text">POPULATION</span>
            <div class="plus-one-wrap">
                <span class="plus">+</span>
                <span class="one">1</span>
                <span class="tm">™</span>
            </div>
        </div>

        <p class="instructions">
            Right-click the logo above → <strong>Save image as...</strong> or take a screenshot.<br>
            Logo is 1080×1080px — perfect for TikTok profile picture / posts.
        </p>
    </div>

</body>

</html>
