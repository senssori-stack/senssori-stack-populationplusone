<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population +1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fff; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 24px; text-align: center; }
        .logo { width: 120px; height: 120px; background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .logo span { font-size: 48px; font-weight: 800; color: white; }
        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 16px; color: #2E7D32; }
        .subtitle { font-size: 1.25rem; color: #333; font-weight: 600; margin: 12px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>+1</span></div>
        <p class="subtitle">POPULATION</p>
        <h1>+1</h1>
        <p class="subtitle">YOUR BABY'S NAME</p>
        <h2 style="font-size: 1.5rem; color: #2E7D32; margin-top: 32px;">Population +1</h2>
        <p style="font-size: 1rem; color: #666; margin-top: 16px;">The iconic population sign birth announcement</p>
    </div>
</body>
</html>
